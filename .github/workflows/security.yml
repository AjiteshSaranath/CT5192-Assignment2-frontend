name: Frontend Security Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

jobs:
  # ── SNYK: Dependency Vulnerability Scanning ──────────────────────
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ── SonarQube: Static Code Analysis ─────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm test -- --coverage --watchAll=false --ci
        continue-on-error: true

      # ── Write sonar-project.properties with secrets ──────────
      - name: Create sonar-project.properties
        run: |
          cat > sonar-project.properties << 'EOF'
          sonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          sonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_FRONTEND }}
          sonar.projectName=LMS Frontend (React)
          sonar.sources=src
          sonar.tests=src/__tests__
          sonar.exclusions=**/node_modules/**,**/*.test.tsx,**/*.test.ts,**/coverage/**
          sonar.test.inclusions=**/*.test.tsx,**/*.test.ts
          sonar.javascript.lcov.reportPaths=coverage/lcov.info
          sonar.sourceEncoding=UTF-8
          EOF

      # ── Run SonarCloud scanner ────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
